<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR — Deise em… Tudo aqui já foi um sonho!</title>
  <link rel="icon" href="assets/icons/icon-192.png">

  <!-- A-Frame 1.4.2 (compatível com MindAR 1.2.5; a 1.5.0 quebra o anchor) -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    /* SEM background opaco no body: o vídeo da câmera fica no fundo e um fundo
       opaco aqui o cobre → tela preta. (No teste que funcionou o body não tinha
       fundo.) A intro tem o próprio gradiente, então não há flash branco. */
    html, body { height: 100%; overflow: hidden; background: transparent; font-family: system-ui, -apple-system, sans-serif; color: #fff; }

    /* Intro: some quando a câmera fica pronta -------------------------- */
    #ar-intro {
      position: fixed; inset: 0; z-index: 300;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 22px; padding: 32px 24px; text-align: center;
      background: radial-gradient(ellipse at 50% 110%, #0d1b3e 0%, #080820 55%, #040410 100%);
      transition: opacity 0.5s ease;
    }
    #ar-intro.hide { opacity: 0; pointer-events: none; }
    .ar-intro-cover {
      width: clamp(100px, 24vw, 150px); border-radius: 8px;
      box-shadow: -4px 6px 28px rgba(0,0,0,0.85), 0 0 0 1px rgba(255,255,255,0.06);
      transform: rotateY(-8deg);
    }
    .ar-intro h1 { font-family: Georgia, serif; font-style: italic; font-weight: 400; font-size: clamp(1.4rem, 5vw, 2rem); }
    .ar-intro p { color: rgba(255,255,255,0.55); font-size: 0.9rem; line-height: 1.5; max-width: 280px; }
    .ar-spinner {
      width: 46px; height: 46px; border: 3px solid rgba(160,100,255,0.2);
      border-top-color: #a060ff; border-radius: 50%; animation: arSpin 0.8s linear infinite;
    }
    @keyframes arSpin { to { transform: rotate(360deg); } }
    .ar-intro-err { display:none; color:#ff8080; font-size:0.82rem; max-width:300px; line-height:1.5; }
    .ar-back-link {
      margin-top: 6px; color: rgba(255,255,255,0.6); text-decoration: none; font-size: 0.85rem;
      border: 1px solid rgba(255,255,255,0.15); border-radius: 999px; padding: 8px 18px;
    }

    /* HUD sobre a câmera ---------------------------------------------- */
    #ar-hud { position: fixed; inset: 0; z-index: 200; pointer-events: none; }
    .ar-back {
      pointer-events: all; position: absolute; top: 20px; left: 20px;
      background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.15); border-radius: 999px;
      padding: 8px 16px; color: #fff; text-decoration: none; font-size: 0.82rem; font-weight: 600;
      display: flex; align-items: center; gap: 6px; backdrop-filter: blur(8px);
    }
    #ar-detected-badge {
      position: absolute; top: 20px; right: 20px; display: none; align-items: center; gap: 8px;
      background: rgba(0,200,100,0.15); border: 1px solid rgba(0,200,100,0.4); border-radius: 999px;
      padding: 8px 14px; font-size: 0.78rem; color: #60ff90; backdrop-filter: blur(8px);
    }
    .ar-dot { width: 7px; height: 7px; background: #60ff90; border-radius: 50%; box-shadow: 0 0 6px #60ff90;
      animation: arDotPulse 1.2s ease-in-out infinite; }
    @keyframes arDotPulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.5;transform:scale(.7);} }
    .ar-hint {
      position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.15); border-radius: 999px;
      padding: 10px 20px; font-size: 0.8rem; color: rgba(255,255,255,0.85); backdrop-filter: blur(8px); white-space: nowrap;
    }

    /* MindAR cria o vídeo da câmera e o canvas — garante que apareçam */
    a-scene { width: 100% !important; height: 100% !important; }
  </style>
</head>
<body>

  <!-- ===================== Intro ===================== -->
  <div id="ar-intro">
    <img class="ar-intro-cover" src="assets/pages/cover.jpg" alt="Capa do livro Deise">
    <div class="ar-spinner" id="ar-spinner"></div>
    <h1>Realidade Aumentada</h1>
    <p id="ar-intro-msg">Permita o acesso à câmera e aponte para a capa do livro físico.</p>
    <p class="ar-intro-err" id="ar-intro-err"></p>
    <a href="ar.html" class="ar-back-link">← Voltar</a>
  </div>

  <!-- ===================== HUD ===================== -->
  <div id="ar-hud">
    <a href="ar.html" class="ar-back">← Sair</a>
    <div id="ar-detected-badge"><span class="ar-dot"></span> Livro detectado!</div>
    <div class="ar-hint" id="ar-hint-text">Aponte para a capa ou uma página</div>
    <span style="position:fixed;bottom:4px;right:8px;color:rgba(255,255,255,0.35);font-size:0.58rem;font-family:monospace;letter-spacing:0.05em;pointer-events:none;z-index:999">v1.0.27</span>
  </div>

  <!-- ===================== Cena AR (declarativa) ===================== -->
  <a-scene
    mindar-image="imageTargetSrc: assets/ar/targets.mind?v=6; autoStart: true; uiLoading: no; uiScanning: no; uiError: no;
                  filterMinCF: 0.00008; filterBeta: 800; missTolerance: 8; warmupTolerance: 3;"
    color-space="sRGB"
    renderer="colorManagement: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets timeout="10000">
      <a-asset-item id="m-deise-capa"  src="assets/ar/deise-capa.glb?v=4"></a-asset-item>
      <a-asset-item id="m-arong-pitch" src="assets/ar/arong-pitch.glb?v=4"></a-asset-item>
      <a-asset-item id="m-familia"     src="assets/ar/familia.glb?v=4"></a-asset-item>
      <a-asset-item id="m-sonhos"      src="assets/ar/sonhos.glb?v=4"></a-asset-item>
      <a-asset-item id="m-deise-bale"  src="assets/ar/deise-bale.glb?v=4"></a-asset-item>
      <a-asset-item id="m-starlet"     src="assets/ar/starlet.glb?v=4"></a-asset-item>
      <a-asset-item id="m-arong"       src="assets/ar/arong.glb?v=4"></a-asset-item>
      <a-asset-item id="m-arvore"      src="assets/ar/arvore.glb?v=4"></a-asset-item>
      <a-asset-item id="m-fada"        src="assets/ar/fada.glb?v=4"></a-asset-item>
      <a-asset-item id="m-livros"      src="assets/ar/livros.glb?v=4"></a-asset-item>
      <a-asset-item id="m-ponte"       src="assets/ar/ponte.glb?v=4"></a-asset-item>
      <a-asset-item id="m-saxofone"    src="assets/ar/saxofone.glb?v=5"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-light type="ambient" intensity="1.1"></a-light>
    <a-light type="directional" intensity="0.8" position="1 2 1"></a-light>

    <!-- Cada alvo tem um .gesture-wrap: os gestos do usuário (girar/zoom) vão nele,
         enquanto as animações idle ficam nos modelos — assim não brigam.
         1 objeto por virada (spread), na página mais ilustrada de cada uma. -->

    <!-- 0 · Capa — Deise sonhando (deise-capa) -->
    <a-entity class="ar-target" data-label="Capa — Deise sonhando" mindar-image-target="targetIndex: 0">
      <a-entity class="gesture-wrap">
        <a-gltf-model src="#m-deise-capa" position="0 -0.12 0.05" scale="0.5 0.5 0.5"
          animation="property: position; from: 0 -0.12 0.05; to: 0 -0.05 0.05; dur: 2400; dir: alternate; loop: true; easing: easeInOutSine"></a-gltf-model>
      </a-entity>
    </a-entity>

    <!-- 1 · Página 4 — Deise jogando bola (arong-pitch) -->
    <a-entity class="ar-target" data-label="Página 4 — Deise jogando bola" mindar-image-target="targetIndex: 1">
      <a-entity class="gesture-wrap">
        <a-gltf-model src="#m-arong-pitch" position="0 -0.12 0.05" scale="0.5 0.5 0.5" rotation="0 12 0"
          animation="property: rotation; from: 0 -8 0; to: 0 12 0; dur: 4000; dir: alternate; loop: true; easing: easeInOutSine"></a-gltf-model>
      </a-entity>
    </a-entity>

    <!-- 2 · Página 6 — Afeto da família (familia) -->
    <a-entity class="ar-target" data-label="Página 6 — Afeto da família" mindar-image-target="targetIndex: 2">
      <a-entity class="gesture-wrap">
        <a-gltf-model src="#m-familia" position="0 -0.12 0.05" scale="0.5 0.5 0.5"
          animation="property: position; from: 0 -0.12 0.05; to: 0 -0.06 0.05; dur: 2800; dir: alternate; loop: true; easing: easeInOutSine"></a-gltf-model>
      </a-entity>
    </a-entity>

    <!-- 3 · Página 8 — Os sonhos (sonhos) -->
    <a-entity class="ar-target" data-label="Página 8 — Os sonhos" mindar-image-target="targetIndex: 3">
      <a-entity class="gesture-wrap">
        <a-gltf-model src="#m-sonhos" position="0 -0.1 0.06" scale="0.5 0.5 0.5"
          animation="property: rotation; to: 0 360 0; dur: 9000; loop: true; easing: linear"></a-gltf-model>
      </a-entity>
    </a-entity>

    <!-- 4 · Página 10 — Lugar mágico / dança (deise-bale) -->
    <a-entity class="ar-target" data-label="Página 10 — Lugar mágico" mindar-image-target="targetIndex: 4">
      <a-entity class="gesture-wrap">
        <a-gltf-model src="#m-deise-bale" position="0 -0.12 0.05" scale="0.5 0.5 0.5" rotation="0 12 0"
          animation="property: rotation; from: 0 -8 0; to: 0 12 0; dur: 4000; dir: alternate; loop: true; easing: easeInOutSine"></a-gltf-model>
      </a-entity>
    </a-entity>

    <!-- 5 · Página 12 — A estrela do sonho (starlet) -->
    <a-entity class="ar-target" data-label="Página 12 — A estrela do sonho" mindar-image-target="targetIndex: 5">
      <a-entity class="gesture-wrap">
        <a-gltf-model src="#m-starlet" position="0 -0.05 0.06" scale="0.5 0.5 0.5"
          animation="property: rotation; to: 0 360 0; dur: 8000; loop: true; easing: linear"></a-gltf-model>
      </a-entity>
    </a-entity>

    <!-- 6 · Página 14 — A ARONG nasce (arong) -->
    <a-entity class="ar-target" data-label="Página 14 — A ARONG nasce" mindar-image-target="targetIndex: 6">
      <a-entity class="gesture-wrap">
        <a-gltf-model src="#m-arong" position="0 -0.12 0.05" scale="0.5 0.5 0.5" rotation="0 -8 0"
          animation="property: rotation; from: 0 -8 0; to: 0 8 0; dur: 5000; dir: alternate; loop: true; easing: easeInOutSine"></a-gltf-model>
      </a-entity>
    </a-entity>

    <!-- 7 · Página 18 — As crianças aprendem (arvore) -->
    <a-entity class="ar-target" data-label="Página 18 — As crianças aprendem" mindar-image-target="targetIndex: 7">
      <a-entity class="gesture-wrap">
        <a-gltf-model src="#m-arvore" position="0 -0.12 0.05" scale="0.5 0.5 0.5"
          animation="property: scale; from: 0.48 0.48 0.48; to: 0.52 0.52 0.52; dur: 3200; dir: alternate; loop: true; easing: easeInOutSine"></a-gltf-model>
      </a-entity>
    </a-entity>

    <!-- 8 · Página 20 — Deise fada madrinha (fada) -->
    <a-entity class="ar-target" data-label="Página 20 — Deise fada madrinha" mindar-image-target="targetIndex: 8">
      <a-entity class="gesture-wrap">
        <a-gltf-model src="#m-fada" position="0 -0.05 0.06" scale="0.5 0.5 0.5"
          animation="property: position; from: 0 -0.05 0.06; to: 0 0.03 0.06; dur: 2600; dir: alternate; loop: true; easing: easeInOutSine"></a-gltf-model>
      </a-entity>
    </a-entity>

    <!-- 9 · Página 22 — Leitura / semente (livros) -->
    <a-entity class="ar-target" data-label="Página 22 — Leitura" mindar-image-target="targetIndex: 9">
      <a-entity class="gesture-wrap">
        <a-gltf-model src="#m-livros" position="0 -0.1 0.06" scale="0.5 0.5 0.5"
          animation="property: rotation; to: 0 360 0; dur: 10000; loop: true; easing: linear"></a-gltf-model>
      </a-entity>
    </a-entity>

    <!-- 10 · Página 25 — Empatia / celebração (ponte) -->
    <a-entity class="ar-target" data-label="Página 25 — Empatia" mindar-image-target="targetIndex: 10">
      <a-entity class="gesture-wrap">
        <a-gltf-model src="#m-ponte" position="0 -0.1 0.05" scale="0.55 0.55 0.55" rotation="0 -10 0"
          animation="property: rotation; from: 0 -10 0; to: 0 10 0; dur: 5000; dir: alternate; loop: true; easing: easeInOutSine"></a-gltf-model>
      </a-entity>
    </a-entity>

    <!-- 11 · Página 16 — Música na ARONG (saxofone) -->
    <a-entity class="ar-target" data-label="Página 16 — Música na ARONG" mindar-image-target="targetIndex: 11">
      <a-entity class="gesture-wrap">
        <a-gltf-model src="#m-saxofone" position="0 -0.12 0.05" scale="0.5 0.5 0.5" rotation="0 10 0"
          animation="property: rotation; from: 0 -8 0; to: 0 10 0; dur: 4200; dir: alternate; loop: true; easing: easeInOutSine"></a-gltf-model>
      </a-entity>
    </a-entity>

  </a-scene>

  <script>
    // ===== Painel de diagnóstico — DESLIGADO por padrão. Ligue com ?debug=1 na URL. =====
    const DEBUG = new URLSearchParams(location.search).get('debug') === '1';
    let dbgEl = null, dbgStatus = null, dbgLog = null;
    function ensureDbg() {
      if (dbgEl || !DEBUG) return;
      dbgEl = document.createElement('div');
      dbgEl.style.cssText = 'position:fixed;left:8px;right:8px;bottom:8px;z-index:9999;background:rgba(0,0,0,0.85);border-radius:8px;font:11px/1.4 monospace;';
      dbgStatus = document.createElement('div');
      dbgStatus.style.cssText = 'color:#ffd166;padding:8px 10px;border-bottom:1px solid #333;white-space:pre-wrap;font-weight:bold;';
      dbgStatus.textContent = '📷 aguardando câmera…';
      dbgLog = document.createElement('div');
      dbgLog.style.cssText = 'color:#0f0;padding:8px 10px;max-height:28vh;overflow:auto;white-space:pre-wrap;';
      dbgEl.appendChild(dbgStatus); dbgEl.appendChild(dbgLog);
      document.body.appendChild(dbgEl);
      const toggle = document.createElement('button');
      toggle.textContent = 'ocultar log ▾';
      toggle.style.cssText = 'position:fixed;right:8px;bottom:8px;z-index:10000;background:#a060ff;color:#fff;border:none;border-radius:8px;padding:8px 12px;font:bold 12px monospace;';
      let hidden = false;
      toggle.onclick = () => { hidden=!hidden; dbgStatus.style.display=hidden?'none':'block'; dbgLog.style.display=hidden?'none':'block'; dbgEl.style.background=hidden?'transparent':'rgba(0,0,0,0.85)'; toggle.textContent=hidden?'mostrar log ▴':'ocultar log ▾'; };
      document.body.appendChild(toggle);
    }
    function dbg(msg){ if(!DEBUG) return; ensureDbg(); const t=(performance.now()/1000).toFixed(1); dbgLog.textContent+=`[${t}s] ${msg}\n`; dbgLog.scrollTop=dbgLog.scrollHeight; }
    function camStatus(tag){
      if(!DEBUG) return; const v=document.querySelector('video');
      if(!v){ if(dbgStatus) dbgStatus.textContent=`📷 ${tag}: sem <video>`; return; }
      if(dbgStatus) dbgStatus.textContent=`📷 ${tag}: ${v.videoWidth}×${v.videoHeight} ready=${v.readyState} paused=${v.paused}`;
    }
    window.addEventListener('error', e => dbg('JS ERROR: ' + (e.message||e.error)));

    const intro    = document.getElementById('ar-intro');
    const spinner  = document.getElementById('ar-spinner');
    const introMsg = document.getElementById('ar-intro-msg');
    const introErr = document.getElementById('ar-intro-err');
    const hint     = document.getElementById('ar-hint-text');
    const badge    = document.getElementById('ar-detected-badge');
    const scene    = document.querySelector('a-scene');

    dbg('página carregada (declarativa) — DEBUG on');

    // Some a intro quando a câmera + tracking estão prontos
    scene.addEventListener('arReady', () => {
      dbg('arReady — câmera + tracking prontos');
      camStatus('arReady');
      intro.classList.add('hide');
      setTimeout(() => intro.style.display = 'none', 600);
      let n = 0; const iv = setInterval(() => { camStatus('tick '+(++n)); if(n>=8) clearInterval(iv); }, 1000);
    });
    scene.addEventListener('arError', e => {
      dbg('arError: ' + (e.detail || '?'));
      spinner.style.display = 'none';
      introErr.style.display = 'block';
      introErr.textContent = '⚠️ Não consegui iniciar a câmera. Verifique a permissão em Ajustes → Safari → Câmera e recarregue.';
    });

    // Log de carga dos modelos
    document.querySelectorAll('a-asset-item').forEach(a => {
      a.addEventListener('loaded', () => dbg('✔ asset: ' + a.id));
      a.addEventListener('error', () => dbg('✘ asset FALHOU: ' + a.id + ' (' + a.getAttribute('src') + ')'));
    });

    // ===== Gestos: girar (1 dedo) e zoom/escala (pinça) no objeto detectado =====
    let activeWrap = null;               // .gesture-wrap do alvo atualmente visível
    const ROT_SPEED = 0.008;             // sensibilidade da rotação
    const MIN_SCALE = 0.4, MAX_SCALE = 3.0;

    // Estado por wrap guardado no próprio elemento (persiste entre detecções)
    function wrapState(el) {
      if (!el._g) el._g = { rotX: 0, rotY: 0, scale: 1 };
      return el._g;
    }
    function applyWrap(el) {
      const g = wrapState(el);
      el.object3D.rotation.y = g.rotY;
      el.object3D.rotation.x = g.rotX;
      el.object3D.scale.setScalar(g.scale);
    }

    let lastX = 0, lastY = 0, lastDist = 0, mode = null;
    function dist(t) { const dx = t[0].clientX - t[1].clientX, dy = t[0].clientY - t[1].clientY; return Math.hypot(dx, dy); }

    window.addEventListener('touchstart', e => {
      if (!activeWrap) return;
      if (e.touches.length === 1) { mode = 'rotate'; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; }
      else if (e.touches.length === 2) { mode = 'pinch'; lastDist = dist(e.touches); }
    }, { passive: true });

    window.addEventListener('touchmove', e => {
      if (!activeWrap || !mode) return;
      const g = wrapState(activeWrap);
      if (mode === 'rotate' && e.touches.length === 1) {
        const t = e.touches[0];
        g.rotY += (t.clientX - lastX) * ROT_SPEED;
        g.rotX += (t.clientY - lastY) * ROT_SPEED;
        g.rotX = Math.max(-1.2, Math.min(1.2, g.rotX)); // limita a inclinação
        lastX = t.clientX; lastY = t.clientY;
        applyWrap(activeWrap);
      } else if (mode === 'pinch' && e.touches.length === 2) {
        const d = dist(e.touches);
        if (lastDist > 0) {
          g.scale *= d / lastDist;
          g.scale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, g.scale));
          applyWrap(activeWrap);
        }
        lastDist = d;
      }
    }, { passive: true });

    window.addEventListener('touchend', e => { if (e.touches.length === 0) mode = null; else if (e.touches.length === 1) { mode = 'rotate'; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; } }, { passive: true });

    // Detecção por alvo
    document.querySelectorAll('.ar-target').forEach(t => {
      const label = t.getAttribute('data-label');
      const wrap = t.querySelector('.gesture-wrap');
      t.addEventListener('targetFound', () => {
        dbg('🎯 targetFound: ' + label);
        badge.style.display = 'flex';
        if (hint) hint.textContent = '👆 Arraste para girar · pinça para zoom';
        activeWrap = wrap;
        if (wrap) applyWrap(wrap); // reaplica o estado do usuário
        const m = t.querySelector('a-gltf-model');
        if (m && window.AFRAME) {
          const o = m.object3D, THREE = AFRAME.THREE;
          const ws = o.getWorldScale(new THREE.Vector3());
          let meshes = 0; o.traverse(n => { if (n.isMesh) meshes++; });
          dbg(`  modelo: meshes=${meshes} worldScale=${ws.x.toFixed(3)} vis=${o.visible}`);
        }
      });
      t.addEventListener('targetLost', () => {
        dbg('targetLost: ' + label);
        badge.style.display = 'none';
        if (activeWrap === wrap) { activeWrap = null; mode = null; }
        if (hint) hint.textContent = 'Aponte para a capa ou uma página';
      });
    });

    // Fallback: se a câmera não iniciar em 18s, mostra erro
    setTimeout(() => {
      if (!intro.classList.contains('hide')) {
        const v = document.querySelector('video');
        if (!v || v.readyState < 2) {
          spinner.style.display = 'none';
          introErr.style.display = 'block';
          introErr.textContent = '⚠️ A câmera demorou a iniciar. Recarregue a página e permita o acesso à câmera.';
        }
      }
    }, 18000);
  </script>

  <!-- PWA: garante que o AR pega a versão nova (auto-reload quando sai update) -->
  <script>
    if ('serviceWorker' in navigator) {
      if (navigator.serviceWorker.controller) {
        let reloaded = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (reloaded) return; reloaded = true; location.reload();
        });
      }
      navigator.serviceWorker.register('sw.js').then(reg => reg.update()).catch(() => {});
    }
  </script>
</body>
</html>
