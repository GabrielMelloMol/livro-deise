<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RA — Livro Deise</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }

    #loading {
      position: fixed; inset: 0;
      background: #1a1a2e;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #fff; z-index: 200;
      gap: 16px; text-align: center; padding: 20px;
    }
    #loading.hidden { display: none; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #ui-overlay {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 16px; z-index: 100;
      display: flex; justify-content: space-between; align-items: flex-end;
    }
    #caption {
      background: rgba(0,0,0,0.7);
      color: #fff; font-size: 0.85rem;
      padding: 8px 14px; border-radius: 8px;
      max-width: 70%; line-height: 1.4;
    }
    #btn-close {
      background: rgba(255,255,255,0.2);
      border: none; color: #fff;
      padding: 10px 16px; border-radius: 8px;
      cursor: pointer; font-size: 0.9rem;
    }

    #hint {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6); color: #fff;
      padding: 8px 16px; border-radius: 20px;
      font-size: 0.85rem; z-index: 100; text-align: center;
      transition: opacity 1s;
    }
    #hint.fade { opacity: 0; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>Carregando Realidade Aumentada...</p>
    <p style="font-size:0.8rem;opacity:0.6">Aponte a câmera para a ilustração do livro</p>
  </div>

  <div id="hint">Aponte para a ilustração da página</div>

  <div id="ui-overlay">
    <div id="caption"></div>
    <button id="btn-close" onclick="history.back()">&#10005; Fechar</button>
  </div>

  <!-- Three.js deve vir ANTES do MindAR para expor window.THREE globalmente -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <!-- MindAR (usa o window.THREE acima) -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>
  <!-- Lottie -->
  <script src="https://cdn.jsdelivr.net/npm/lottie-web@5.12.2/build/player/lottie.min.js"></script>
  <!-- tsParticles -->
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
  <!-- Howler -->
  <script src="https://cdn.jsdelivr.net/npm/howler@2.2.4/dist/howler.min.js"></script>

  <script type="module" src="../js/ar-scene.js"></script>
</body>
</html>
