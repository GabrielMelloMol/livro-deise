<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Deise em… Tudo aqui já foi um sonho!</title>
  <meta name="theme-color" content="#080820">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: radial-gradient(ellipse at 50% 110%, #0d1b3e 0%, #080820 55%, #040410 100%);
      min-height: 100dvh;
      font-family: Georgia, serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      overflow: hidden;
    }

    #card {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      max-width: 360px;
      width: 100%;
    }

    .book-title {
      text-align: center;
      color: rgba(255,255,255,0.45);
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      line-height: 1.5;
    }
    .book-title strong {
      display: block;
      font-size: 1rem;
      font-style: italic;
      color: rgba(255,255,255,0.75);
      margin-bottom: 2px;
    }

    #page-thumb {
      width: 100%;
      max-width: 240px;
      border-radius: 10px;
      box-shadow: 0 10px 50px rgba(0,0,0,0.7);
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px;
      border-radius: 14px;
      border: none;
      font-size: 1rem;
      font-family: Georgia, serif;
      cursor: pointer;
      width: 100%;
      transition: transform 0.1s, opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.97); opacity: 0.85; }

    .btn-audio  { background: #f77f00; color: #fff; }
    .btn-libras { background: #0077b6; color: #fff; }

    .btn-book {
      display: block;
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.5);
      font-size: 0.82rem;
      padding: 12px;
      text-decoration: none;
      border-radius: 10px;
      text-align: center;
      transition: background 0.2s;
    }
    .btn-book:hover { background: rgba(255,255,255,0.13); }

    .hidden { display: none !important; }

    #status {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.35);
      text-align: center;
      min-height: 1.2em;
    }

    /* Overlay Libras */
    #overlay-libras {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    #overlay-libras.hidden { display: none; }
    .ov-inner { position: relative; }
    .ov-close {
      position: absolute;
      top: -40px; right: 0;
      background: rgba(255,255,255,0.18);
      border: none;
      color: #fff;
      font-size: 1rem;
      padding: 5px 14px;
      border-radius: 5px;
      cursor: pointer;
    }
    #video-libras { display: block; max-width: 94vw; max-height: 80vh; border-radius: 10px; }
  </style>
</head>
<body>

<div id="card">
  <div class="book-title">
    <strong>Deise em…</strong>
    Tudo aqui já foi um sonho!
  </div>

  <img id="page-thumb" src="" alt="Página do livro">

  <div class="actions">
    <button class="btn btn-audio hidden" id="btn-audio">🔊 Ouvir narração</button>
    <button class="btn btn-libras hidden" id="btn-libras">🤟 Ver em Libras</button>
    <a href="../" class="btn btn-book">📖 Abrir livro digital</a>
  </div>
  <p id="status"></p>
</div>

<div id="overlay-libras" class="hidden">
  <div class="ov-inner">
    <button class="ov-close" id="btn-close-libras">✕ Fechar</button>
    <video id="video-libras" controls playsinline></video>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/howler@2.2.4/dist/howler.min.js"></script>
<script type="module">
import { PAGES } from '../js/config.js';
import '../js/stars.js';

const params = new URLSearchParams(location.search);
const id     = parseInt(params.get('id'), 10);
const page   = PAGES.find(p => p.id === id);

const thumb      = document.getElementById('page-thumb');
const btnAudio   = document.getElementById('btn-audio');
const btnLibras  = document.getElementById('btn-libras');
const status     = document.getElementById('status');
const overlayLib = document.getElementById('overlay-libras');
const videoLib   = document.getElementById('video-libras');

if (!page) {
  status.textContent = 'Página não encontrada.';
} else {
  thumb.src = '../' + page.image;
  thumb.alt = `Página ${page.id} do livro`;
  document.title = `Deise — Página ${page.id}`;

  // Narração
  if (page.audio) {
    btnAudio.classList.remove('hidden');
    let sound = null;
    let playing = false;

    btnAudio.addEventListener('click', () => {
      if (playing) {
        sound?.stop();
        playing = false;
        btnAudio.innerHTML = '🔊 Ouvir narração';
        return;
      }
      btnAudio.innerHTML = '⏳ Carregando…';
      sound = new Howl({
        src: ['../' + page.audio],
        html5: true,
        onplay:  () => { playing = true;  btnAudio.innerHTML = '⏸ Pausar narração'; },
        onend:   () => { playing = false; btnAudio.innerHTML = '🔊 Ouvir narração'; },
        onstop:  () => { playing = false; btnAudio.innerHTML = '🔊 Ouvir narração'; },
        onerror: () => { playing = false; btnAudio.innerHTML = '🔊 Ouvir narração'; status.textContent = 'Áudio não disponível ainda.'; },
      });
      sound.play();
    });
  } else {
    status.textContent = 'Narração não disponível para esta página.';
  }

  // Libras
  if (page.libras) {
    btnLibras.classList.remove('hidden');
    btnLibras.addEventListener('click', () => {
      videoLib.src = '../' + page.libras;
      overlayLib.classList.remove('hidden');
      videoLib.play();
    });
  }
}

// Fechar overlay Libras
document.getElementById('btn-close-libras').addEventListener('click', closeLibras);
overlayLib.addEventListener('click', e => { if (e.target === overlayLib) closeLibras(); });
function closeLibras() {
  videoLib.pause();
  videoLib.src = '';
  overlayLib.classList.add('hidden');
}
</script>
</body>
</html>
