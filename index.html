<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Deise em... Tudo aqui já foi um sonho!</title>
  <meta name="description" content="Livro digital interativo inclusivo — Deise em... Tudo aqui já foi um sonho! Com Realidade Aumentada, narração em áudio e Libras.">
  <meta property="og:title" content="Deise em... Tudo aqui já foi um sonho!">
  <meta property="og:description" content="Livro digital interativo com Realidade Aumentada, narração e Libras.">
  <meta property="og:url" content="https://gabrielmellomol.github.io/livro-deise/">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
</head>
<body>
  <div id="app">
    <div id="flipbook-container">
      <div id="flipbook"></div>
    </div>

    <div id="controls">
      <button id="btn-prev" aria-label="Página anterior">&#8592;</button>
      <span id="page-indicator"></span>
      <button id="btn-next" aria-label="Próxima página">&#8594;</button>
    </div>

    <!-- Overlay de vídeo Libras -->
    <div id="overlay-libras" class="overlay hidden" role="dialog" aria-label="Vídeo em Libras">
      <div class="overlay-content">
        <button class="overlay-close" aria-label="Fechar">&#10005;</button>
        <video id="video-libras" controls playsinline></video>
      </div>
    </div>

    <!-- Overlay de áudio -->
    <div id="overlay-audio" class="overlay-audio hidden">
      <button id="btn-audio-close" aria-label="Parar narração">&#10005;</button>
      <span>&#9654; Narrando...</span>
    </div>

    <a href="assets/livro-deise.epub" download
       style="color:rgba(255,255,255,0.4);font-size:0.75rem;padding:4px 8px;text-decoration:none;text-align:center;display:block;"
       aria-label="Baixar versão acessível para leitores de tela">
      ♿ Versão acessível (.epub)
    </a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/howler@2.2.4/dist/howler.min.js"></script>
  <script type="module" src="js/flipbook.js"></script>
</body>
</html>
